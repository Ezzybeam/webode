<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Geometry Dash</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; margin: 0 auto; }
  </style>

  <!-- Webode core — must run before game module -->
  <script src="https://cdn.jsdelivr.net/gh/Ezzybeam/webode@main/webode.js"></script>

  <!-- Mods -->
  <script src="https://cdn.jsdelivr.net/gh/Ezzybeam/webode@main/mods/noclip.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/Ezzybeam/webode@main/mods/reset.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/Ezzybeam/webode@main/mods/hitboxes.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/Ezzybeam/webode@main/mods/speedhack.js"></script>

  <!-- Game -->
  <script type="module" crossorigin src="./assets/index-game.js"></script>

  <script>
    new ResizeObserver(() => {
      window.dispatchEvent(new Event('resize'));
    }).observe(document.documentElement);
  </script>
</head>
<body></body>
</html>
